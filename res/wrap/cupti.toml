[general]
library_name = "libcupti"
output_file_path = "../../lib/cupti/libcupti.jl"
prologue_file_path = "./libcupti_prologue.jl"

output_ignorelist = [
    # these change often
    "^CUPTI_API_VERSION$",
]


[codegen]
use_ccall_macro = true
always_NUL_terminated_string = true


[api]
checked_rettypes = [ "CUptiResult" ]

[api.cuptiGetResultString]
needs_context = false

[api.cuptiGetVersion]
needs_context = false

# Profiler Host API functions (no CUDA context needed)
[api.cuptiProfilerHostInitialize]
needs_context = false

[api.cuptiProfilerHostDeinitialize]
needs_context = false

[api.cuptiProfilerHostGetSupportedChips]
needs_context = false

[api.cuptiProfilerHostGetBaseMetrics]
needs_context = false

[api.cuptiProfilerHostGetSubMetrics]
needs_context = false

[api.cuptiProfilerHostGetMetricProperties]
needs_context = false

[api.cuptiProfilerHostConfigAddMetrics]
needs_context = false

[api.cuptiProfilerHostGetConfigImageSize]
needs_context = false

[api.cuptiProfilerHostGetConfigImage]
needs_context = false

[api.cuptiProfilerHostGetNumOfPasses]
needs_context = false

[api.cuptiProfilerHostEvaluateToGpuValues]
needs_context = false

[api.cuptiProfilerHostGetSinglePassSets]
needs_context = false

[api.cuptiProfilerHostGetMetricsInSinglePassSet]
needs_context = false

[api.cuptiProfilerHostGetRangeName]
needs_context = false
