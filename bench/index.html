<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <style>
      html {
        font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fff;
        font-size: 16px;
      }
      body {
        color: #4a4a4a;
        margin: 8px;
        font-size: 1em;
        font-weight: 400;
      }
      header {
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
      }
      main {
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      a {
        color: #3273dc;
        cursor: pointer;
        text-decoration: none;
      }
      a:hover {
        color: #000;
      }
      button {
        color: #fff;
        background-color: #3298dc;
        border-color: transparent;
        cursor: pointer;
        text-align: center;
      }
      button:hover {
        background-color: #2793da;
        flex: none;
      }
      .spacer {
        flex: auto;
      }
      .small {
        font-size: 0.75rem;
      }
      footer {
        margin-top: 16px;
        display: flex;
        align-items: center;
      }
      .header-label {
        margin-right: 4px;
      }
      .benchmark-set {
        margin: 8px 0;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .benchmark-title {
        font-size: 3rem;
        font-weight: 600;
        word-break: break-word;
        text-align: center;
      }
      .benchmark-graphs {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
      }
      .benchmark-chart {
        max-width: 1000px;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background-color: #fff;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .search-input {
        flex: 1 1 240px;
        max-width: 420px;
        padding: 6px 10px;
        font-size: 1em;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .search-input:focus {
        outline: none;
        border-color: #3273dc;
      }
      .search-status {
        font-size: 0.85em;
        color: #888;
      }
      .window-select {
        padding: 6px 10px;
        font-size: 0.9em;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: white;
        color: #333;
        cursor: pointer;
        font-family: inherit;
      }
      .window-select:focus {
        outline: none;
        border-color: #3273dc;
      }
      .summary-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 0 0 12px;
        font-size: 0.9em;
      }
      .summary-pill {
        padding: 3px 10px;
        border-radius: 12px;
        background-color: #f4f4f4;
        color: #555;
        cursor: pointer;
        user-select: none;
        border: 1px solid transparent;
      }
      .summary-pill:hover {
        filter: brightness(0.95);
      }
      .summary-pill.active {
        border-color: #333;
        box-shadow: 0 0 0 1px #333 inset;
      }
      .summary-pill.regr { background-color: #fde2e2; color: #9b2020; }
      .summary-pill.impr { background-color: #def0e2; color: #1f6a30; }
      .summary-pill.flat { background-color: #f0f0f0; color: #666; }
      .group {
        margin: 12px 0;
        border: 1px solid #eee;
        border-radius: 6px;
        padding: 0 12px;
      }
      .group[open] {
        padding-bottom: 8px;
      }
      .group-summary {
        cursor: pointer;
        padding: 10px 0;
        font-size: 1.25rem;
        font-weight: 600;
        display: flex;
        align-items: baseline;
        gap: 10px;
        user-select: none;
      }
      .group-name {
        color: #333;
      }
      .group-count {
        font-size: 0.8rem;
        font-weight: 400;
        color: #888;
      }
      .bench-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .bench-wrapper[data-window-hidden],
      .bench-wrapper[data-search-hidden],
      .bench-wrapper[data-trend-hidden] {
        display: none;
      }
      .bench-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        width: 100%;
        max-width: 1000px;
        padding: 8px 4px 2px;
        gap: 12px;
      }
      .bench-header-name {
        font-weight: 600;
        color: #333;
        font-size: 0.95rem;
      }
      .bench-header-stats {
        display: flex;
        gap: 12px;
        align-items: baseline;
        font-size: 0.85rem;
        font-variant-numeric: tabular-nums;
      }
      .bench-stat-value {
        color: #555;
      }
      .bench-stat-delta.strong-up   { color: #c01818; font-weight: 600; }
      .bench-stat-delta.mild-up     { color: #c97a00; }
      .bench-stat-delta.flat        { color: #aaa; }
      .bench-stat-delta.mild-down   { color: #4a9858; }
      .bench-stat-delta.strong-down { color: #1f7e30; font-weight: 600; }
      .bench-chart-container {
        position: relative;
        width: 100%;
        max-width: 1000px;
      }
      .bench-placeholder {
        width: 100%;
        min-height: 200px;
      }
      .bench-controls {
        position: absolute;
        top: 6px;
        right: 6px;
        z-index: 1;
        display: flex;
        gap: 4px;
      }
      .control-btn {
        background-color: rgba(255, 255, 255, 0.92);
        color: #666;
        border: 1px solid #ddd;
        padding: 2px 8px;
        font-size: 0.75rem;
        font-family: inherit;
        border-radius: 3px;
        cursor: pointer;
      }
      .control-btn:hover {
        background-color: #f0f0f0;
        color: #333;
      }
      .control-btn.active {
        background-color: #3273dc;
        color: #fff;
        border-color: #3273dc;
      }
    </style>
    <title>Benchmarks</title>
  </head>

  <body>
    <header id="header">
      <div class="header-item">
        <strong class="header-label">Last Update:</strong>
        <span id="last-update"></span>
      </div>
      <div class="header-item">
        <strong class="header-label">Repository:</strong>
        <a id="repository-link" rel="noopener"></a>
      </div>
    </header>
    <div class="toolbar">
      <input type="search" id="search-input" class="search-input" placeholder="Filter benchmarks (e.g. reduce, reverse, latency)" autocomplete="off" />
      <select id="window-select" class="window-select" title="Time window">
        <option value="3m" selected>Last 3 months</option>
        <option value="6m">Last 6 months</option>
        <option value="1y">Last year</option>
        <option value="2y">Last 2 years</option>
        <option value="all">All time</option>
      </select>
      <span id="search-status" class="search-status"></span>
    </div>
    <div id="summary-bar" class="summary-bar"></div>
    <main id="main"></main>
    <footer>
      <button id="dl-button">Download data as JSON</button>
      <div class="spacer"></div>
      <div class="small">Powered by <a rel="noopener" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@0.7.7/chartjs-plugin-zoom.min.js"></script>
    <script src="data.js"></script>
    <script id="main-script">
      'use strict';
      (function() {
        // Colors from https://github.com/github/linguist/blob/master/lib/linguist/languages.yml
        const toolColors = {
          cargo: '#dea584',
          go: '#00add8',
          benchmarkjs: '#f1e05a',
          benchmarkluau: '#000080',
          pytest: '#3572a5',
          googlecpp: '#f34b7d',
          catch2: '#f34b7d',
          julia: '#a270ba',
          jmh: '#b07219',
          benchmarkdotnet: '#178600',
          customBiggerIsBetter: '#38ff38',
          customSmallerIsBetter: '#ff3838',
          _: '#333333'
        };

        function init() {
          function collectBenchesPerTestCase(entries) {
            const map = new Map();
            for (const entry of entries) {
              const {commit, date, tool, benches} = entry;
              for (const bench of benches) {
                const result = { commit, date, tool, bench };
                const arr = map.get(bench.name);
                if (arr === undefined) {
                  map.set(bench.name, [result]);
                } else {
                  arr.push(result);
                }
              }
            }
            return map;
          }

          const data = window.BENCHMARK_DATA;

          // Render header
          document.getElementById('last-update').textContent = new Date(data.lastUpdate).toString();
          const repoLink = document.getElementById('repository-link');
          repoLink.href = data.repoUrl;
          repoLink.textContent = data.repoUrl;

          // Render footer
          document.getElementById('dl-button').onclick = () => {
            const dataUrl = 'data:,' + JSON.stringify(data, null, 2);
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'benchmark_data.json';
            a.click();
          };

          // Sort entries by commit timestamp so the chart x-axis is chronological
          // regardless of the order in which benchmark runs were uploaded.
          for (const name of Object.keys(data.entries)) {
            data.entries[name].sort((a, b) =>
              new Date(a.commit.timestamp) - new Date(b.commit.timestamp)
            );
          }

          // Prepare data points for charts
          return Object.keys(data.entries).map(name => ({
            name,
            dataSet: collectBenchesPerTestCase(data.entries[name]),
          }));
        }

        function renderAllChars(dataSets) {

          // Lazy chart instantiation: build the Chart only when the canvas
          // scrolls into view, so opening the page with hundreds of charts
          // doesn't block on Chart.js construction.
          const lazyObserver = new IntersectionObserver((entries, obs) => {
            for (const entry of entries) {
              if (!entry.isIntersecting) continue;
              const canvas = entry.target;
              if (canvas._chartBuilt) continue;
              canvas._chartBuilt = true;
              buildChart(canvas, canvas._chartName, canvas._chartDataset);
              obs.unobserve(canvas);
            }
          }, { rootMargin: '300px' });

          // Time window: charts and stats only consider points within the
          // currently selected cutoff. Changing the toolbar select re-runs
          // populateBench for every wrapper.
          function cutoffFromValue(value) {
            if (value === 'all') return null;
            const now = new Date();
            const c = new Date(now);
            switch (value) {
              case '3m': c.setMonth(now.getMonth() - 3); break;
              case '6m': c.setMonth(now.getMonth() - 6); break;
              case '1y': c.setFullYear(now.getFullYear() - 1); break;
              case '2y': c.setFullYear(now.getFullYear() - 2); break;
              default: return null;
            }
            return c;
          }

          function filterDataset(dataset, cutoff) {
            if (!cutoff) return dataset;
            return dataset.filter(d => new Date(d.commit.timestamp) >= cutoff);
          }

          let currentCutoff = cutoffFromValue('3m');
          // null | 'regressed' | 'stable' | 'improved' — clicking a summary
          // pill toggles this on; clicking the same pill again clears it.
          let currentTrendFilter = null;

          function trendCategory(wrapper) {
            const t = wrapper._trend;
            if (t == null || !Number.isFinite(t)) return 'stable';
            const cls = classifyTrend(t * 100);
            if (cls === 'strong-up' || cls === 'mild-up') return 'regressed';
            if (cls === 'strong-down' || cls === 'mild-down') return 'improved';
            return 'stable';
          }

          function applyTrendFilter() {
            const wrappers = document.querySelectorAll('.bench-wrapper');
            for (const w of wrappers) {
              if (!currentTrendFilter || trendCategory(w) === currentTrendFilter) {
                delete w.dataset.trendHidden;
              } else {
                w.dataset.trendHidden = '';
              }
            }
          }

          // Pick a single display unit for the chart based on the median of
          // the data, converting nanoseconds to µs / ms / s as appropriate.
          // Non-time units are passed through unchanged.
          function pickUnit(rawUnit, values) {
            if (rawUnit !== 'ns') return { divisor: 1, label: rawUnit, dimension: rawUnit };
            const finite = values.filter(v => Number.isFinite(v) && v > 0);
            const pick = (divisor, label) => ({ divisor, label, dimension: 'time' });
            if (finite.length === 0) return pick(1, 'ns');
            const sorted = [...finite].sort((a, b) => a - b);
            const median = sorted[Math.floor(sorted.length / 2)];
            if (median >= 1e9) return pick(1e9, 's');
            if (median >= 1e6) return pick(1e6, 'ms');
            if (median >= 1e3) return pick(1e3, 'µs');
            return pick(1, 'ns');
          }

          function formatValue(v, unit) {
            if (!Number.isFinite(v)) return String(v);
            const scaled = v / unit.divisor;
            const abs = Math.abs(scaled);
            let formatted;
            if (abs === 0) formatted = '0';
            else if (abs >= 100) formatted = scaled.toFixed(0);
            else if (abs >= 10) formatted = scaled.toFixed(1);
            else if (abs >= 1) formatted = scaled.toFixed(2);
            else formatted = scaled.toPrecision(3);
            return formatted + ' ' + unit.label;
          }

          function median(values) {
            if (values.length === 0) return NaN;
            const sorted = [...values].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 === 0
              ? (sorted[mid - 1] + sorted[mid]) / 2
              : sorted[mid];
          }

          // Trend: median of a small recent sample vs. median of a small
          // baseline sample at the start of the visible window. Inspired by
          // codespeed's "current vs. average of N-oldest" but symmetric, so a
          // single noisy run smooths out at both ends. Sampling small
          // endpoints (rather than splitting the window in half) means a
          // step change anywhere in the middle still shows its full
          // magnitude, since both samples sit on opposite sides of the step.
          //
          // Returns a fractional change (0.05 = +5%) or null when there
          // aren't enough samples to compare.
          function computeTrend(values) {
            if (values.length < 4) return null;
            // Sample 15% of the series at each end, clamped to [3, 10].
            let k = Math.min(10, Math.max(3, Math.floor(values.length * 0.15)));
            if (k * 2 > values.length) k = Math.floor(values.length / 2);
            const baseline = median(values.slice(0, k));
            const recent = median(values.slice(-k));
            if (!Number.isFinite(baseline) || baseline <= 0) return null;
            return (recent - baseline) / baseline;
          }

          // Two-tier classification: |trend| > MAJOR → strong, > MINOR → mild,
          // else flat. Matches codespeed's red/green vs yellow/lightgreen
          // scheme for "definite change" vs "drifting".
          const TREND_MINOR = 3;  // percent
          const TREND_MAJOR = 7;

          function classifyTrend(pct) {
            if (!Number.isFinite(pct)) return 'unknown';
            if (pct >= TREND_MAJOR)  return 'strong-up';
            if (pct >= TREND_MINOR)  return 'mild-up';
            if (pct > -TREND_MINOR)  return 'flat';
            if (pct > -TREND_MAJOR)  return 'mild-down';
            return 'strong-down';
          }

          // Compute a robust y-axis range using Tukey fences (Q1 - 1.5*IQR,
          // Q3 + 1.5*IQR) so a single outlier run doesn't squash all the
          // recent variation into a flat line at the bottom.
          function computeYRange(values) {
            const finite = values.filter(v => Number.isFinite(v));
            if (finite.length < 4) return {};

            const sorted = [...finite].sort((a, b) => a - b);
            const quantile = p => {
              const i = p * (sorted.length - 1);
              const lo = Math.floor(i);
              const hi = Math.ceil(i);
              return sorted[lo] + (sorted[hi] - sorted[lo]) * (i - lo);
            };
            const q1 = quantile(0.25);
            const q3 = quantile(0.75);
            const median = quantile(0.5);
            const iqr = q3 - q1;

            let min = q1 - 1.5 * iqr;
            let max = q3 + 1.5 * iqr;

            // For flat-ish series open a ~10% window around the median, so the
            // chart isn't drawn as a straight line glued to the axis.
            const minSpan = Math.max(Math.abs(median) * 0.1, 1);
            if (max - min < minSpan) {
              min = median - minSpan / 2;
              max = median + minSpan / 2;
            }

            // For non-negative data, don't dip the axis below zero.
            if (min < 0 && sorted[0] >= 0) min = 0;

            return { min, max };
          }

          function buildChart(canvas, name, dataset) {
            const color = toolColors[dataset.length > 0 ? dataset[0].tool : '_'];
            const values = dataset.map(d => d.bench.value);
            const points = dataset.map(d => ({
              x: new Date(d.commit.timestamp),
              y: d.bench.value,
            }));
            const data = {
              datasets: [
                {
                  label: name,
                  data: points,
                  borderColor: color,
                  backgroundColor: color + '60', // Add alpha for #rrggbbaa
                  // Straight segments between points; the default Bezier
                  // curve invents motion that isn't in the data.
                  lineTension: 0,
                }
              ],
            };
            const rawUnit = dataset.length > 0 ? dataset[0].bench.unit : '';
            const unit = pickUnit(rawUnit, values);
            const tickConfig = {
              callback: value => formatValue(value, unit),
            };
            if (!canvas._logScale) {
              Object.assign(tickConfig, computeYRange(values));
            }
            const yAxis = {
              scaleLabel: {
                display: true,
                labelString: unit.dimension,
              },
              ticks: tickConfig,
            };
            if (canvas._logScale) {
              yAxis.type = 'logarithmic';
            }
            const options = {
              // Wider than tall — default is 2, this packs more charts per
              // screen on the dashboard.
              aspectRatio: 2.5,
              // The chart name lives in the per-chart header above the canvas,
              // so the single-series legend is redundant.
              legend: { display: false },
              plugins: {
                zoom: {
                  // Wheel zoom would fight page scroll on this long page;
                  // keep zoom to an explicit drag-to-select gesture, plus
                  // pinch on touch devices via hammerjs.
                  pan: { enabled: false },
                  zoom: {
                    enabled: true,
                    mode: 'x',
                    drag: {
                      backgroundColor: 'rgba(50, 115, 220, 0.15)',
                      borderColor: 'rgba(50, 115, 220, 0.6)',
                      borderWidth: 1,
                    },
                  },
                },
              },
              scales: {
                xAxes: [
                  {
                    type: 'time',
                    time: {
                      // Let Chart.js pick day / week / month / quarter / year
                      // based on the visible range; format each unit nicely.
                      displayFormats: {
                        day: 'D MMM',
                        week: 'D MMM',
                        month: 'MMM YYYY',
                        quarter: 'MMM YYYY',
                        year: 'YYYY',
                      },
                      tooltipFormat: 'D MMM YYYY',
                    },
                    scaleLabel: { display: false },
                  }
                ],
                yAxes: [yAxis],
              },
              tooltips: {
                callbacks: {
                  // Just the first line of the commit message; full details are
                  // a click away via the chart's onClick handler.
                  title: items => {
                    const commit = dataset[items[0].index].commit;
                    return commit.message.split('\n')[0];
                  },
                  label: item => {
                    const i = item.index;
                    let label = formatValue(dataset[i].bench.value, unit);
                    if (i > 0) {
                      const prev = dataset[i - 1].bench.value;
                      const cur = dataset[i].bench.value;
                      if (prev > 0 && Number.isFinite(prev)) {
                        const pct = (cur - prev) / prev * 100;
                        const sign = pct > 0 ? '+' : '';
                        label += '  ' + sign + pct.toFixed(1) + '%';
                      }
                    }
                    return label;
                  },
                }
              },
              onClick: (_mouseEvent, activeElems) => {
                if (activeElems.length === 0) {
                  return;
                }
                // XXX: Undocumented. How can we know the index?
                const index = activeElems[0]._index;
                const url = dataset[index].commit.url;
                window.open(url, '_blank');
              },
            };

            canvas._chartInstance = new Chart(canvas, {
              type: 'line',
              data,
              options,
            });
          }

          function renderBench(parent, name, fullDataset) {
            const wrapper = document.createElement('div');
            wrapper.className = 'bench-wrapper';
            wrapper.dataset.benchName = name.toLowerCase();
            wrapper._fullDataset = fullDataset;
            wrapper._name = name;
            parent.appendChild(wrapper);

            const chartContainer = document.createElement('div');
            chartContainer.className = 'bench-chart-container';

            const controls = document.createElement('div');
            controls.className = 'bench-controls';
            const logBtn = document.createElement('button');
            logBtn.type = 'button';
            logBtn.className = 'control-btn';
            logBtn.textContent = 'log';
            logBtn.title = 'Toggle logarithmic y-axis';
            controls.appendChild(logBtn);
            const resetBtn = document.createElement('button');
            resetBtn.type = 'button';
            resetBtn.className = 'control-btn';
            resetBtn.textContent = 'reset';
            resetBtn.title = 'Reset zoom';
            controls.appendChild(resetBtn);
            chartContainer.appendChild(controls);

            const canvas = document.createElement('canvas');
            canvas.className = 'benchmark-chart bench-placeholder';
            canvas._chartName = name;
            canvas._logScale = false;
            chartContainer.appendChild(canvas);

            wrapper.appendChild(chartContainer);
            wrapper._canvas = canvas;
            wrapper._chartContainer = chartContainer;

            logBtn.addEventListener('click', () => {
              canvas._logScale = !canvas._logScale;
              logBtn.classList.toggle('active', canvas._logScale);
              if (canvas._chartInstance) {
                canvas._chartInstance.destroy();
                canvas._chartInstance = null;
              }
              // The user is interacting with this chart, so rebuild now rather
              // than waiting for the lazy observer.
              canvas._chartBuilt = true;
              buildChart(canvas, canvas._chartName, canvas._chartDataset);
            });

            resetBtn.addEventListener('click', () => {
              if (canvas._chartInstance && canvas._chartInstance.resetZoom) {
                canvas._chartInstance.resetZoom();
              }
            });

            populateBench(wrapper);
          }

          // Apply the current time window to a wrapper: rebuild its header from
          // the filtered dataset and reset its chart so the lazy observer
          // builds it on demand with the new data.
          function populateBench(wrapper) {
            const dataset = filterDataset(wrapper._fullDataset, currentCutoff);

            // Hide charts that have nothing meaningful to show in this window
            // (need at least 2 points for a line segment).
            if (dataset.length < 2) {
              wrapper.dataset.windowHidden = '';
            } else {
              delete wrapper.dataset.windowHidden;
            }

            const values = dataset.map(d => d.bench.value);
            const rawUnit = dataset.length > 0 ? dataset[0].bench.unit : '';
            const unit = pickUnit(rawUnit, values);
            const trend = computeTrend(values);
            // Stored on the wrapper for sortWrappers().
            wrapper._trend = trend;

            if (wrapper._header) wrapper._header.remove();
            wrapper._header = createBenchHeader(wrapper._name, dataset, unit, trend);
            wrapper.insertBefore(wrapper._header, wrapper._chartContainer);

            const canvas = wrapper._canvas;
            canvas._chartDataset = dataset;
            if (canvas._chartInstance) {
              canvas._chartInstance.destroy();
              canvas._chartInstance = null;
            }
            canvas._chartBuilt = false;
            lazyObserver.observe(canvas);
          }

          function createBenchHeader(name, dataset, unit, trend) {
            const header = document.createElement('div');
            header.className = 'bench-header';

            const nameElem = document.createElement('span');
            nameElem.className = 'bench-header-name';
            nameElem.textContent = name;
            header.appendChild(nameElem);

            const stats = document.createElement('span');
            stats.className = 'bench-header-stats';
            header.appendChild(stats);

            if (dataset.length > 0) {
              const latest = dataset[dataset.length - 1].bench.value;
              const valueElem = document.createElement('span');
              valueElem.className = 'bench-stat-value';
              valueElem.textContent = formatValue(latest, unit);
              stats.appendChild(valueElem);

              if (trend != null && Number.isFinite(trend)) {
                const pct = trend * 100;
                const cls = classifyTrend(pct);
                const arrow = cls.endsWith('-up') ? '▲'
                            : cls.endsWith('-down') ? '▼'
                            : '·';
                const sign = pct > 0 ? '+' : '';
                const deltaElem = document.createElement('span');
                deltaElem.className = 'bench-stat-delta ' + cls;
                deltaElem.textContent = arrow + ' ' + sign + pct.toFixed(1) + '%';
                deltaElem.title = 'Trend: median of recent samples vs. median of baseline samples in the visible window';
                stats.appendChild(deltaElem);
              }
            }

            return header;
          }

          function renderBenchSet(name, benchSet, main) {
            const setElem = document.createElement('div');
            setElem.className = 'benchmark-set';
            main.appendChild(setElem);

            const nameElem = document.createElement('h1');
            nameElem.className = 'benchmark-title';
            nameElem.textContent = name;
            setElem.appendChild(nameElem);

            const graphs = document.createElement('div');
            graphs.className = 'benchmark-graphs';
            setElem.appendChild(graphs);

            for (const [benchName, benches] of benchSet.entries()) {
              renderBench(graphs, benchName, benches);
            }
          }

          // Reorder wrappers so the worst regressions float to the top.
          // Five buckets, in display order: strong-up, mild-up, flat/unknown,
          // mild-down, strong-down. Within a regression/improvement bucket,
          // larger magnitude comes first.
          function bucketIndex(wrapper) {
            const t = wrapper._trend;
            if (t == null || !Number.isFinite(t)) return 2;
            const cls = classifyTrend(t * 100);
            return { 'strong-up': 0, 'mild-up': 1, 'flat': 2, 'mild-down': 3, 'strong-down': 4 }[cls];
          }

          function sortWrappers() {
            const containers = document.querySelectorAll('.benchmark-graphs');
            for (const container of containers) {
              const wrappers = Array.from(container.querySelectorAll(':scope > .bench-wrapper'));
              wrappers.sort((a, b) => {
                const ba = bucketIndex(a), bb = bucketIndex(b);
                if (ba !== bb) return ba - bb;
                if (ba <= 1) return b._trend - a._trend;  // regressions: worst first
                if (ba >= 3) return a._trend - b._trend;  // improvements: best first
                return a._name.localeCompare(b._name);
              });
              for (const w of wrappers) container.appendChild(w);
            }
          }

          function updateSummary() {
            const wrappers = document.querySelectorAll('.bench-wrapper');
            const counts = { 'strong-up': 0, 'mild-up': 0, 'flat': 0, 'mild-down': 0, 'strong-down': 0, 'unknown': 0 };
            let inWindow = 0;
            for (const w of wrappers) {
              if ('windowHidden' in w.dataset) continue;
              inWindow++;
              const t = w._trend;
              const cls = t == null || !Number.isFinite(t)
                ? 'unknown'
                : classifyTrend(t * 100);
              counts[cls]++;
            }
            const bar = document.getElementById('summary-bar');
            const reg = counts['strong-up'] + counts['mild-up'];
            const imp = counts['strong-down'] + counts['mild-down'];
            const flat = counts['flat'] + counts['unknown'];
            const pillCls = (variant, cat) => 'summary-pill ' + variant
              + (currentTrendFilter === cat ? ' active' : '');
            const parts = [];
            parts.push(`<span class="${pillCls('regr', 'regressed')}" data-category="regressed" title="Show only regressions">`
                       + `${reg} ▲ regressed`
                       + (counts['strong-up'] ? ` (${counts['strong-up']} strong)` : '')
                       + `</span>`);
            parts.push(`<span class="${pillCls('flat', 'stable')}" data-category="stable" title="Show only stable benchmarks">`
                       + `${flat} stable</span>`);
            parts.push(`<span class="${pillCls('impr', 'improved')}" data-category="improved" title="Show only improvements">`
                       + `${imp} ▼ improved`
                       + (counts['strong-down'] ? ` (${counts['strong-down']} strong)` : '')
                       + `</span>`);
            bar.innerHTML = parts.join('');
            bar.style.display = inWindow === 0 ? 'none' : '';
          }

          const input = document.getElementById('search-input');
          const status = document.getElementById('search-status');

          function applyFilter() {
            const query = input.value.trim().toLowerCase();
            const wrappers = document.querySelectorAll('.bench-wrapper');
            let totalVisible = 0;
            let totalBenches = 0;
            for (const wrapper of wrappers) {
              const matchesSearch = !query || wrapper.dataset.benchName.includes(query);
              if (matchesSearch) {
                delete wrapper.dataset.searchHidden;
              } else {
                wrapper.dataset.searchHidden = '';
              }
              const hasData = !('windowHidden' in wrapper.dataset);
              const matchesTrend = !('trendHidden' in wrapper.dataset);
              if (hasData) totalBenches++;
              if (matchesSearch && hasData && matchesTrend) totalVisible++;
            }
            if (query || currentTrendFilter) {
              status.textContent = totalVisible + ' / ' + totalBenches + ' shown';
            } else {
              status.textContent = totalBenches + ' charts';
            }
          }

          const main = document.getElementById('main');
          for (const {name, dataSet} of dataSets) {
            renderBenchSet(name, dataSet, main);
          }

          sortWrappers();
          updateSummary();
          applyTrendFilter();
          applyFilter();

          // Summary pills — click to toggle a category filter.
          document.getElementById('summary-bar').addEventListener('click', (e) => {
            const pill = e.target.closest('.summary-pill');
            if (!pill) return;
            const cat = pill.dataset.category;
            if (!cat) return;
            currentTrendFilter = (currentTrendFilter === cat) ? null : cat;
            applyTrendFilter();
            updateSummary();
            applyFilter();
          });

          // Search input
          input.addEventListener('input', applyFilter);
          document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== input) {
              e.preventDefault();
              input.focus();
              input.select();
            }
          });

          // Time-window select
          document.getElementById('window-select').addEventListener('change', (e) => {
            currentCutoff = cutoffFromValue(e.target.value);
            for (const wrapper of document.querySelectorAll('.bench-wrapper')) {
              populateBench(wrapper);
            }
            sortWrappers();
            updateSummary();
            applyTrendFilter();
            applyFilter();
          });
        }

        renderAllChars(init()); // Start
      })();
    </script>
  </body>
</html>
