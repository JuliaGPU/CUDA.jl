<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <style>
      html {
        font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fff;
        font-size: 16px;
      }
      body {
        color: #4a4a4a;
        margin: 8px;
        font-size: 1em;
        font-weight: 400;
      }
      header {
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
      }
      main {
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      a {
        color: #3273dc;
        cursor: pointer;
        text-decoration: none;
      }
      a:hover {
        color: #000;
      }
      button {
        color: #fff;
        background-color: #3298dc;
        border-color: transparent;
        cursor: pointer;
        text-align: center;
      }
      button:hover {
        background-color: #2793da;
        flex: none;
      }
      .spacer {
        flex: auto;
      }
      .small {
        font-size: 0.75rem;
      }
      footer {
        margin-top: 16px;
        display: flex;
        align-items: center;
      }
      .header-label {
        margin-right: 4px;
      }
      .benchmark-set {
        margin: 8px 0;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .benchmark-title {
        font-size: 3rem;
        font-weight: 600;
        word-break: break-word;
        text-align: center;
      }
      .benchmark-graphs {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
      }
      .benchmark-chart {
        max-width: 1000px;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background-color: #fff;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .search-input {
        flex: 1 1 240px;
        max-width: 420px;
        padding: 6px 10px;
        font-size: 1em;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .search-input:focus {
        outline: none;
        border-color: #3273dc;
      }
      .search-status {
        font-size: 0.85em;
        color: #888;
      }
      .group {
        margin: 12px 0;
        border: 1px solid #eee;
        border-radius: 6px;
        padding: 0 12px;
      }
      .group[open] {
        padding-bottom: 8px;
      }
      .group-summary {
        cursor: pointer;
        padding: 10px 0;
        font-size: 1.25rem;
        font-weight: 600;
        display: flex;
        align-items: baseline;
        gap: 10px;
        user-select: none;
      }
      .group-name {
        color: #333;
      }
      .group-count {
        font-size: 0.8rem;
        font-weight: 400;
        color: #888;
      }
      .bench-wrapper {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .bench-placeholder {
        width: 100%;
        max-width: 1000px;
        min-height: 320px;
      }
      .bench-controls {
        position: absolute;
        top: 6px;
        right: 6px;
        z-index: 1;
        display: flex;
        gap: 4px;
      }
      .control-btn {
        background-color: rgba(255, 255, 255, 0.92);
        color: #666;
        border: 1px solid #ddd;
        padding: 2px 8px;
        font-size: 0.75rem;
        font-family: inherit;
        border-radius: 3px;
        cursor: pointer;
      }
      .control-btn:hover {
        background-color: #f0f0f0;
        color: #333;
      }
      .control-btn.active {
        background-color: #3273dc;
        color: #fff;
        border-color: #3273dc;
      }
    </style>
    <title>Benchmarks</title>
  </head>

  <body>
    <header id="header">
      <div class="header-item">
        <strong class="header-label">Last Update:</strong>
        <span id="last-update"></span>
      </div>
      <div class="header-item">
        <strong class="header-label">Repository:</strong>
        <a id="repository-link" rel="noopener"></a>
      </div>
    </header>
    <div class="toolbar">
      <input type="search" id="search-input" class="search-input" placeholder="Filter benchmarks (e.g. reduce, reverse, latency)" autocomplete="off" />
      <span id="search-status" class="search-status"></span>
    </div>
    <main id="main"></main>
    <footer>
      <button id="dl-button">Download data as JSON</button>
      <div class="spacer"></div>
      <div class="small">Powered by <a rel="noopener" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.min.js"></script>
    <script src="data.js"></script>
    <script id="main-script">
      'use strict';
      (function() {
        // Colors from https://github.com/github/linguist/blob/master/lib/linguist/languages.yml
        const toolColors = {
          cargo: '#dea584',
          go: '#00add8',
          benchmarkjs: '#f1e05a',
          benchmarkluau: '#000080',
          pytest: '#3572a5',
          googlecpp: '#f34b7d',
          catch2: '#f34b7d',
          julia: '#a270ba',
          jmh: '#b07219',
          benchmarkdotnet: '#178600',
          customBiggerIsBetter: '#38ff38',
          customSmallerIsBetter: '#ff3838',
          _: '#333333'
        };

        function init() {
          function collectBenchesPerTestCase(entries) {
            const map = new Map();
            for (const entry of entries) {
              const {commit, date, tool, benches} = entry;
              for (const bench of benches) {
                const result = { commit, date, tool, bench };
                const arr = map.get(bench.name);
                if (arr === undefined) {
                  map.set(bench.name, [result]);
                } else {
                  arr.push(result);
                }
              }
            }
            return map;
          }

          const data = window.BENCHMARK_DATA;

          // Render header
          document.getElementById('last-update').textContent = new Date(data.lastUpdate).toString();
          const repoLink = document.getElementById('repository-link');
          repoLink.href = data.repoUrl;
          repoLink.textContent = data.repoUrl;

          // Render footer
          document.getElementById('dl-button').onclick = () => {
            const dataUrl = 'data:,' + JSON.stringify(data, null, 2);
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'benchmark_data.json';
            a.click();
          };

          // Sort entries by commit timestamp so the chart x-axis is chronological
          // regardless of the order in which benchmark runs were uploaded.
          for (const name of Object.keys(data.entries)) {
            data.entries[name].sort((a, b) =>
              new Date(a.commit.timestamp) - new Date(b.commit.timestamp)
            );
          }

          // Prepare data points for charts
          return Object.keys(data.entries).map(name => ({
            name,
            dataSet: collectBenchesPerTestCase(data.entries[name]),
          }));
        }

        function renderAllChars(dataSets) {

          // Lazy chart instantiation: build the Chart only when the canvas
          // scrolls into view, so opening the page with hundreds of charts
          // doesn't block on Chart.js construction.
          const lazyObserver = new IntersectionObserver((entries, obs) => {
            for (const entry of entries) {
              if (!entry.isIntersecting) continue;
              const canvas = entry.target;
              if (canvas._chartBuilt) continue;
              canvas._chartBuilt = true;
              buildChart(canvas, canvas._chartName, canvas._chartDataset);
              obs.unobserve(canvas);
            }
          }, { rootMargin: '300px' });

          // Pick a single display unit for the chart based on the median of
          // the data, converting nanoseconds to µs / ms / s as appropriate.
          // Non-time units are passed through unchanged.
          function pickUnit(rawUnit, values) {
            if (rawUnit !== 'ns') return { divisor: 1, label: rawUnit, dimension: rawUnit };
            const finite = values.filter(v => Number.isFinite(v) && v > 0);
            const pick = (divisor, label) => ({ divisor, label, dimension: 'time' });
            if (finite.length === 0) return pick(1, 'ns');
            const sorted = [...finite].sort((a, b) => a - b);
            const median = sorted[Math.floor(sorted.length / 2)];
            if (median >= 1e9) return pick(1e9, 's');
            if (median >= 1e6) return pick(1e6, 'ms');
            if (median >= 1e3) return pick(1e3, 'µs');
            return pick(1, 'ns');
          }

          function formatValue(v, unit) {
            if (!Number.isFinite(v)) return String(v);
            const scaled = v / unit.divisor;
            const abs = Math.abs(scaled);
            let formatted;
            if (abs === 0) formatted = '0';
            else if (abs >= 100) formatted = scaled.toFixed(0);
            else if (abs >= 10) formatted = scaled.toFixed(1);
            else if (abs >= 1) formatted = scaled.toFixed(2);
            else formatted = scaled.toPrecision(3);
            return formatted + ' ' + unit.label;
          }

          // Compute a robust y-axis range using Tukey fences (Q1 - 1.5*IQR,
          // Q3 + 1.5*IQR) so a single outlier run doesn't squash all the
          // recent variation into a flat line at the bottom.
          function computeYRange(values) {
            const finite = values.filter(v => Number.isFinite(v));
            if (finite.length < 4) return {};

            const sorted = [...finite].sort((a, b) => a - b);
            const quantile = p => {
              const i = p * (sorted.length - 1);
              const lo = Math.floor(i);
              const hi = Math.ceil(i);
              return sorted[lo] + (sorted[hi] - sorted[lo]) * (i - lo);
            };
            const q1 = quantile(0.25);
            const q3 = quantile(0.75);
            const median = quantile(0.5);
            const iqr = q3 - q1;

            let min = q1 - 1.5 * iqr;
            let max = q3 + 1.5 * iqr;

            // For flat-ish series open a ~10% window around the median, so the
            // chart isn't drawn as a straight line glued to the axis.
            const minSpan = Math.max(Math.abs(median) * 0.1, 1);
            if (max - min < minSpan) {
              min = median - minSpan / 2;
              max = median + minSpan / 2;
            }

            // For non-negative data, don't dip the axis below zero.
            if (min < 0 && sorted[0] >= 0) min = 0;

            return { min, max };
          }

          function buildChart(canvas, name, dataset) {
            const color = toolColors[dataset.length > 0 ? dataset[0].tool : '_'];
            const values = dataset.map(d => d.bench.value);
            const data = {
              labels: dataset.map(d => d.commit.id.slice(0, 7)),
              datasets: [
                {
                  label: name,
                  data: values,
                  borderColor: color,
                  backgroundColor: color + '60', // Add alpha for #rrggbbaa
                }
              ],
            };
            const rawUnit = dataset.length > 0 ? dataset[0].bench.unit : '';
            const unit = pickUnit(rawUnit, values);
            const tickConfig = {
              callback: value => formatValue(value, unit),
            };
            if (!canvas._logScale) {
              Object.assign(tickConfig, computeYRange(values));
            }
            const yAxis = {
              scaleLabel: {
                display: true,
                labelString: unit.dimension,
              },
              ticks: tickConfig,
            };
            if (canvas._logScale) {
              yAxis.type = 'logarithmic';
            }
            const options = {
              scales: {
                xAxes: [
                  {
                    scaleLabel: {
                      display: true,
                      labelString: 'commit',
                    },
                  }
                ],
                yAxes: [yAxis],
              },
              tooltips: {
                callbacks: {
                  afterTitle: items => {
                    const {index} = items[0];
                    const data = dataset[index];
                    return '\n' + data.commit.message + '\n\n' + data.commit.timestamp + ' committed by @' + data.commit.committer.username + '\n';
                  },
                  label: item => {
                    let label = formatValue(item.value, unit);
                    const { range } = dataset[item.index].bench;
                    if (range) {
                      label += ' (' + range + ')';
                    }
                    return label;
                  },
                  afterLabel: item => {
                    const { extra } = dataset[item.index].bench;
                    return extra ? '\n' + extra : '';
                  }
                }
              },
              onClick: (_mouseEvent, activeElems) => {
                if (activeElems.length === 0) {
                  return;
                }
                // XXX: Undocumented. How can we know the index?
                const index = activeElems[0]._index;
                const url = dataset[index].commit.url;
                window.open(url, '_blank');
              },
            };

            canvas._chartInstance = new Chart(canvas, {
              type: 'line',
              data,
              options,
            });
          }

          function renderBench(parent, name, dataset) {
            const wrapper = document.createElement('div');
            wrapper.className = 'bench-wrapper';
            wrapper.dataset.benchName = name.toLowerCase();
            parent.appendChild(wrapper);

            const controls = document.createElement('div');
            controls.className = 'bench-controls';
            const logBtn = document.createElement('button');
            logBtn.type = 'button';
            logBtn.className = 'control-btn';
            logBtn.textContent = 'log';
            logBtn.title = 'Toggle logarithmic y-axis';
            controls.appendChild(logBtn);
            wrapper.appendChild(controls);

            const canvas = document.createElement('canvas');
            canvas.className = 'benchmark-chart bench-placeholder';
            canvas._chartName = name;
            canvas._chartDataset = dataset;
            canvas._logScale = false;
            wrapper.appendChild(canvas);

            logBtn.addEventListener('click', () => {
              canvas._logScale = !canvas._logScale;
              logBtn.classList.toggle('active', canvas._logScale);
              if (canvas._chartInstance) {
                canvas._chartInstance.destroy();
                canvas._chartInstance = null;
              }
              // The user is interacting with this chart, so rebuild now rather
              // than waiting for the lazy observer.
              canvas._chartBuilt = true;
              buildChart(canvas, canvas._chartName, canvas._chartDataset);
            });

            lazyObserver.observe(canvas);
          }

          function renderGroup(parent, groupName, items) {
            const group = document.createElement('details');
            group.className = 'group';
            group.open = true;
            group.dataset.groupName = groupName.toLowerCase();
            parent.appendChild(group);

            const summary = document.createElement('summary');
            summary.className = 'group-summary';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'group-name';
            nameSpan.textContent = groupName;
            const countSpan = document.createElement('span');
            countSpan.className = 'group-count';
            countSpan.textContent = items.length + (items.length === 1 ? ' chart' : ' charts');
            summary.appendChild(nameSpan);
            summary.appendChild(countSpan);
            group.appendChild(summary);

            const graphs = document.createElement('div');
            graphs.className = 'benchmark-graphs';
            group.appendChild(graphs);

            for (const {benchName, benches} of items) {
              renderBench(graphs, benchName, benches);
            }
          }

          function renderBenchSet(name, benchSet, main) {
            const setElem = document.createElement('div');
            setElem.className = 'benchmark-set';
            main.appendChild(setElem);

            const nameElem = document.createElement('h1');
            nameElem.className = 'benchmark-title';
            nameElem.textContent = name;
            setElem.appendChild(nameElem);

            // Group benches by the first path segment of their name.
            const groups = new Map();
            for (const [benchName, benches] of benchSet.entries()) {
              const slash = benchName.indexOf('/');
              const groupName = slash === -1 ? benchName : benchName.slice(0, slash);
              if (!groups.has(groupName)) groups.set(groupName, []);
              groups.get(groupName).push({benchName, benches});
            }

            const sortedGroupNames = [...groups.keys()].sort();
            for (const groupName of sortedGroupNames) {
              const items = groups.get(groupName);
              items.sort((a, b) => a.benchName.localeCompare(b.benchName));
              renderGroup(setElem, groupName, items);
            }
          }

          const main = document.getElementById('main');
          for (const {name, dataSet} of dataSets) {
            renderBenchSet(name, dataSet, main);
          }

          initSearch();
        }

        function initSearch() {
          const input = document.getElementById('search-input');
          const status = document.getElementById('search-status');
          const groups = Array.from(document.querySelectorAll('.group'));
          // Remember each group's user-toggled open state, so a search-driven
          // auto-expand doesn't permanently override what the user collapsed.
          const groupUserOpen = new Map(groups.map(g => [g, g.open]));
          for (const g of groups) {
            g.addEventListener('toggle', () => {
              if (input.value.trim() === '') groupUserOpen.set(g, g.open);
            });
          }

          function applyFilter() {
            const query = input.value.trim().toLowerCase();
            let totalVisible = 0;
            let totalBenches = 0;
            for (const group of groups) {
              let visibleCount = 0;
              const benches = group.querySelectorAll('.bench-wrapper');
              totalBenches += benches.length;
              for (const bench of benches) {
                const match = !query || bench.dataset.benchName.includes(query);
                bench.style.display = match ? '' : 'none';
                if (match) visibleCount++;
              }
              group.style.display = visibleCount === 0 ? 'none' : '';
              totalVisible += visibleCount;
              if (query) {
                group.open = visibleCount > 0;
              } else {
                group.open = groupUserOpen.get(group);
              }
            }
            if (query) {
              status.textContent = totalVisible + ' / ' + totalBenches + ' shown';
            } else {
              status.textContent = '';
            }
          }

          input.addEventListener('input', applyFilter);
          // Focus the search bar on '/' for quick keyboard access.
          document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== input) {
              e.preventDefault();
              input.focus();
              input.select();
            }
          });
        }

        renderAllChars(init()); // Start
      })();
    </script>
  </body>
</html>
